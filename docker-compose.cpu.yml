version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    ports:
      - "8001:8000"
    restart: unless-stopped
    volumes:
      - sialar_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sialar_data:
